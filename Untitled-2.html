<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Glos App</title>
    <style>
        body {
            padding-top: 80px;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            }
.mainTitle {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 50px;
    color: #1bf0c2;
    font-weight: 700;
    letter-spacing: 1px;
    background: rgba(15, 23, 42, 0.6);
    padding: 8px 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

.screen {
    text-align: center;
    width: 90%;
    max-width: 500px;
    }

    .grid {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
    }

    .card {
        background: #5173a3;
        padding: 30px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 30px;
        width: 150px;
        transition: 0.2s;
        font-weight: bold;
    }

    .card:hover {
        transform: scale(1.05);
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    input {
        padding:10px;
        border-radius: 10px;
        border: none;
        width: 80%;
        margin-top: 20px;
    }

    .hidden {
        display:none;
    }

    .menuTitel {
        font-size: 32px;
    margin-bottom: 60px;
    }
.bigButton {
    padding: 30px;
    width: 260px;
    border-radius: 18px;
    font-size: 20px;
    background: #2563eb;
}

    </style>
    </head>
    <body>
<h1 class="mainTitle">Språk Specialisten</h1>

        <div id="startScreen" class="screen">
        <h2>Välj språk</h2>
        <div class="grid">
        <div class="card" onclick="chooseLanguage('fr')">Franska</div>
        <div class="card" onclick="chooseLanguage('en')">Engelska</div>

    </div>
    </div>

<div id="menuScreen" class="screen hidden">
    <h1 id="menuTitle" class="menuTitel"></h1>
    <button id="listButton" class="bigButton" onclick="openList()"></button>
    <br>
    <button onclick="backToStart()">⬅ Tillbaka</button>
    </div>


    <div id="appScreen" class="screen hidden">
        <button onclick="goToMenu()">⬅ Meny</button>
        <h2 id="title"></h2>

        <p id="question"></p>
        <input id="answer" placeholder="Skriv svar..." />
        <br>
        <button onclick="checkAnswer()">Svara</button>

        <p id="feedback"></p>
        </div>

            function chooseLanguage(lang) {
                currentLanguage = lang;
                words = wordList[lang];
                currentIndex = 0;

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('menuScreen').classList.remove('hidden');

                document.getElementById('menuTitle').innerText =
                lang === 'fr' ? 'Franska' : 'Engelska';

                document.getElementById('listButton').innerText = lang === 'fr' ? 'Franska blandad' : 'Engelska blandad';
                }

              function openList() {
                document.getElementById('menuScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');

                document.getElementById('title').innerText = currentLanguage === 'fr' ? 'Franska glosor' : 'Engelska glosor';

                showWord();
              }

    function backToStart() {
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
    }

    function goToMenu() {
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('menuScreen').classList.remove('hidden')
    }
    

                function showWord() {
                    document.getElementById('feedback').innerText = '';
                    document.getElementById('answer').value = '';

                    const word = words[currentIndex];
                    document.getElementById('question').innerText = word.sv;
                }


             function checkAnswer() {
    const input = document.getElementById('answer').value;
    const word = words[currentIndex];
    
    let correct = currentLanguage === 'fr' ? word.fr : word.en;

   if (normalize(input) === normalize(correct)) {
        document.getElementById('feedback').innerText = 'Rätt';

        setTimeout(() => {
            nextWord();
        }, 500);

    } else {
        document.getElementById('feedback').innerText = 'Fel! Rätt svar: ' + correct;
    }
}


function nextWord() {

let newIndex;

do{
    newIndex = Math.floor(Math.random() * words.length);
    } while (newIndex === currentIndex && words.length > 1);
    currentIndex = newIndex;
    showWord();
}

function normalize(text) {
    return text
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

document.getElementById('answer').addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        checkAnswer();
    }
});
